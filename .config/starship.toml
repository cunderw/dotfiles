"$schema" = 'https://starship.rs/config-schema.json'

# Mirrors the general shape of the previous powerlevel10k setup:
#   line 1 (left):  os icon, ssh/user@host (remote only), directory, git branch, git status
#   line 2 (left):  prompt character (vi-mode aware)
#   line 2 (right):  exit status, duration, jobs, active toolchain versions, cloud context, time

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$fill\
$cmd_duration\
$status\
$jobs\
$nodejs\
$golang\
$rust\
$ruby\
$kubernetes\
$terraform\
$aws\
$gcloud\
$azure\
$direnv\
$time\
$line_break\
$character"""

add_newline = false

[fill]
symbol = ' '

[character]
success_symbol = '[ÔØ»](bold green)'
error_symbol = '[ÔØ»](bold red)'
vicmd_symbol = '[ÔØ«](bold yellow)'

[os]
disabled = false
style = 'bold blue'

[os.symbols]
Macos = '¾░ÇÁ'
Linux = ''

# Only shown for root or when connected over SSH, mirroring p10k's CONTEXT segment.
[username]
style_user = 'bold #d7af87'
style_root = 'bold yellow'
format = '[$user]($style)'
show_always = false

[hostname]
ssh_only = true
format = '[@$hostname]($style) '
style = 'bold #d7af87'

[directory]
style = 'bold blue'
truncation_length = 8
truncate_to_repo = true
read_only = ' ¾░î¥'

[git_branch]
symbol = ' '
style = 'bold green'
format = 'on [$symbol$branch]($style) '

[git_status]
style = 'yellow'
format = '([$all_status$ahead_behind]($style)) '
conflicted = '='
ahead = 'Ôçí${count}'
behind = 'Ôçú${count}'
diverged = 'ÔçòÔçí${ahead_count}Ôçú${behind_count}'
untracked = ''
stashed = '*'
modified = '!'
staged = '+'
renamed = '┬╗'
deleted = 'Ô£İ'

[status]
disabled = false
style = 'bold red'
symbol = 'Ô£İ '
format = '[$symbol$status]($style) '

[cmd_duration]
min_time = 500
style = 'yellow'
format = '[$duration]($style) '

[jobs]
symbol = 'Ô£Ğ'
style = 'bold blue'
number_threshold = 1
format = '[$symbol]($style) '

[nodejs]
symbol = ' '
style = 'bold green'
format = '[$symbol$version]($style) '

[golang]
symbol = ' '
style = 'bold cyan'
format = '[$symbol$version]($style) '

[rust]
symbol = ' '
style = 'bold red'
format = '[$symbol$version]($style) '

[ruby]
symbol = ' '
style = 'bold red'
format = '[$symbol$version]($style) '

[kubernetes]
disabled = false
symbol = 'Ôİ© '
style = 'bold cyan'
format = '[$symbol$context]($style) '

[terraform]
symbol = '­şÆá '
style = 'bold magenta'
format = '[$symbol$workspace]($style) '

[aws]
symbol = '  '
style = 'bold #ff9900'
format = '[$symbol$profile]($style) '

[gcloud]
symbol = '¾▒çÂ '
style = 'bold blue'
format = '[$symbol$account]($style) '

[azure]
symbol = '¾░áà '
style = 'bold blue'
format = '[$symbol$subscription]($style) '

[direnv]
disabled = false
symbol = ''
style = 'bold yellow'
format = '[$symbol$loaded/$allowed]($style) '

[time]
disabled = false
style = 'yellow'
format = 'at [$time]($style) '
time_format = '%H:%M:%S'

[package]
disabled = true
